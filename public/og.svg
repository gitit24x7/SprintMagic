<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbfbfa"/>
      <stop offset="1" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#d946ef"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#c4b5fd" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#c4b5fd" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="980" cy="120" rx="380" ry="280" fill="url(#glow)"/>

  <!-- brand -->
  <g transform="translate(80,72)">
    <rect width="44" height="44" rx="11" fill="url(#mark)"/>
    <text x="22" y="31" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">S</text>
    <text x="60" y="30" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" fill="#1a1a1a">SprintMagic</text>
  </g>

  <!-- headline -->
  <text x="80" y="288" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="68" font-weight="700" fill="#1a1a1a" letter-spacing="-2">Your sprint board is just</text>
  <text x="80" y="368" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="-2">
    <tspan fill="#1a1a1a">a</tspan><tspan dx="20" fill="#7c3aed">Markdown file.</tspan>
  </text>

  <!-- subline -->
  <text x="82" y="430" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500" fill="#5f5e5b">A Jira-style board that updates itself from your git activity.</text>

  <!-- chips -->
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">
    <g transform="translate(82,486)">
      <rect width="232" height="48" rx="24" fill="#ffffff" stroke="#ededec"/>
      <circle cx="30" cy="24" r="5" fill="#10b981"/>
      <text x="50" y="32" fill="#5f5e5b">Markdown-native</text>
    </g>
    <g transform="translate(330,486)">
      <rect width="158" height="48" rx="24" fill="#ffffff" stroke="#ededec"/>
      <circle cx="30" cy="24" r="5" fill="#8b5cf6"/>
      <text x="50" y="32" fill="#5f5e5b">Git-sync</text>
    </g>
    <g transform="translate(504,486)">
      <rect width="158" height="48" rx="24" fill="#ffffff" stroke="#ededec"/>
      <circle cx="30" cy="24" r="5" fill="#0ea5e9"/>
      <text x="50" y="32" fill="#5f5e5b">No signup</text>
    </g>
  </g>

  <!-- mini board hint, right -->
  <g transform="translate(820,180)">
    <rect x="0" y="0" width="150" height="220" rx="16" fill="#ffffff" stroke="#ededec"/>
    <text x="16" y="30" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#a1a1aa">IN PROGRESS</text>
    <rect x="14" y="46" width="122" height="64" rx="10" fill="#ffffff" stroke="#ededec"/>
    <rect x="26" y="60" width="12" height="12" rx="3" fill="#10b981"/>
    <rect x="46" y="62" width="74" height="8" rx="4" fill="#e4e4e7"/>
    <rect x="26" y="86" width="40" height="12" rx="6" fill="#f1f5f9"/>
    <rect x="14" y="122" width="122" height="64" rx="10" fill="#ffffff" stroke="#ededec"/>
    <rect x="26" y="136" width="12" height="12" rx="3" fill="#0ea5e9"/>
    <rect x="46" y="138" width="64" height="8" rx="4" fill="#e4e4e7"/>
    <rect x="26" y="162" width="50" height="12" rx="6" fill="#ede9fe"/>
  </g>
  <g transform="translate(990,180)">
    <rect x="0" y="0" width="130" height="220" rx="16" fill="#ffffff" stroke="#ededec"/>
    <text x="16" y="30" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#a1a1aa">DONE</text>
    <rect x="14" y="46" width="102" height="64" rx="10" fill="#ffffff" stroke="#ededec"/>
    <rect x="26" y="60" width="12" height="12" rx="3" fill="#ef4444"/>
    <rect x="46" y="62" width="54" height="8" rx="4" fill="#e4e4e7"/>
    <rect x="26" y="86" width="56" height="12" rx="6" fill="#dcfce7"/>
  </g>
</svg>
