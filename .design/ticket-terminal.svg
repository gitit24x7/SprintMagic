<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="660" viewBox="0 0 760 330" fill="none">
  <rect width="760" height="330" fill="#f7f6f3"/>
  <text x="20" y="28" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1c1917">Ticket × Terminal — two takes on the mix</text>
  <text x="20" y="44" font-family="Inter, Arial, sans-serif" font-size="11" fill="#a8a29e">stub holds the key like a ticket number · body reads like a terminal</text>

  <text x="20" y="74" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#44403c">A · Vertical stub</text>
  <text x="392" y="74" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#44403c">B · Tear-off top</text>

  <!-- ───────── A · Vertical stub + terminal body ───────── -->
  <g transform="translate(20,84)">
    <rect x="0" y="0" width="348" height="210" rx="12" fill="#ffffff" stroke="#1c1917" stroke-width="1.3"/>
    <circle cx="72" cy="0" r="6" fill="#f7f6f3"/>
    <circle cx="72" cy="210" r="6" fill="#f7f6f3"/>
    <line x1="72" y1="12" x2="72" y2="198" stroke="#d6d3d1" stroke-width="1.2" stroke-dasharray="2 4"/>
    <!-- stub: vertical traffic lights, type, key -->
    <circle cx="36" cy="18" r="3.5" fill="#f43f5e"/>
    <circle cx="36" cy="30" r="3.5" fill="#f59e0b"/>
    <circle cx="36" cy="42" r="3.5" fill="#10b981"/>
    <rect x="28" y="60" width="16" height="16" rx="4" fill="#10b981"/>
    <rect x="33" y="65" width="6" height="6" rx="1" fill="#ffffff"/>
    <text transform="rotate(-90 36 150)" x="36" y="150" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" letter-spacing="1.5" fill="#78716c">SM-5</text>
    <!-- body -->
    <circle cx="322" cy="32" r="13" fill="#fed7aa"/>
    <text x="322" y="36" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="600" fill="#9a3412">AL</text>
    <text x="88" y="42" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="500"><tspan fill="#f97316">&gt; </tspan><tspan fill="#1c1917">Build login form</tspan></text>
    <rect x="241" y="30" width="2.4" height="15" fill="#f97316"/>
    <text x="88" y="68" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7c3aed">// Login</text>
    <text x="88" y="192" font-family="ui-monospace, Menlo, monospace" font-size="11"><tspan fill="#f43f5e">high</tspan><tspan fill="#78716c"> · 5pt · jun 15 · 0/3</tspan></text>
  </g>

  <!-- ───────── B · Tear-off terminal header ───────── -->
  <g transform="translate(392,84)">
    <rect x="0" y="0" width="348" height="210" rx="12" fill="#ffffff" stroke="#1c1917" stroke-width="1.3"/>
    <!-- terminal header chrome -->
    <circle cx="18" cy="20" r="3.5" fill="#f43f5e"/>
    <circle cx="30" cy="20" r="3.5" fill="#f59e0b"/>
    <circle cx="42" cy="20" r="3.5" fill="#10b981"/>
    <text x="332" y="24" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#a8a29e">SM-5 · login-form</text>
    <!-- horizontal tear -->
    <circle cx="0" cy="38" r="6" fill="#f7f6f3"/>
    <circle cx="348" cy="38" r="6" fill="#f7f6f3"/>
    <line x1="10" y1="38" x2="338" y2="38" stroke="#d6d3d1" stroke-width="1.2" stroke-dasharray="2 4"/>
    <!-- body -->
    <rect x="18" y="56" width="16" height="16" rx="4" fill="#10b981"/>
    <rect x="23" y="61" width="6" height="6" rx="1" fill="#ffffff"/>
    <text x="42" y="69" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="500"><tspan fill="#f97316">&gt; </tspan><tspan fill="#1c1917">Build login form</tspan></text>
    <rect x="197" y="57" width="2.4" height="15" fill="#f97316"/>
    <text x="18" y="96" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7c3aed">// Login</text>
    <text x="18" y="192" font-family="ui-monospace, Menlo, monospace" font-size="11"><tspan fill="#f43f5e">high</tspan><tspan fill="#78716c"> · 5pt · jun 15 · 0/3</tspan></text>
    <circle cx="322" cy="186" r="13" fill="#fed7aa"/>
    <text x="322" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="600" fill="#9a3412">AL</text>
  </g>
</svg>
