  <line x1="20" y1="170" x2="740" y2="170" stroke="#e7e5e4" stroke-width="1"/>
  <text x="20" y="194" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#44403c">In context</text>

