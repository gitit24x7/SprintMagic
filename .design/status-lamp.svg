<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="840" viewBox="0 0 760 420" fill="none">
  <rect width="760" height="420" fill="#f7f6f3"/>
  <text x="20" y="26" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1c1917">The three dots = a status lamp</text>
  <text x="20" y="42" font-family="Inter, Arial, sans-serif" font-size="11" fill="#a8a29e">one lit at a time · same fixed spot on every card · scan a column and reds jump out</text>

  <!-- legend: 4 states -->
  <!-- To do -->
  <g transform="translate(70,0)">
    <circle cx="0" cy="78" r="5" fill="#ffffff" stroke="#d6d3d1" stroke-width="1.4"/>
    <circle cx="0" cy="93" r="5" fill="#ffffff" stroke="#d6d3d1" stroke-width="1.4"/>
    <circle cx="0" cy="108" r="5" fill="#ffffff" stroke="#d6d3d1" stroke-width="1.4"/>
    <text x="0" y="132" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#57534e">To do</text>
    <text x="0" y="148" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#a8a29e">idle · all dim</text>
  </g>
  <!-- In progress -->
  <g transform="translate(260,0)">
    <circle cx="0" cy="78" r="5" fill="#ffffff" stroke="#d6d3d1" stroke-width="1.4"/>
    <circle cx="0" cy="93" r="9" fill="#f59e0b" opacity="0.16"/>
    <circle cx="0" cy="93" r="5" fill="#f59e0b"/>
    <circle cx="0" cy="108" r="5" fill="#ffffff" stroke="#d6d3d1" stroke-width="1.4"/>
