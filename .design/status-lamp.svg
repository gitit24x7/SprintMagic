    <circle cx="0" cy="78" r="5" fill="#f43f5e"/>
    <circle cx="0" cy="93" r="5" fill="#ffffff" stroke="#d6d3d1" stroke-width="1.4"/>
    <circle cx="0" cy="108" r="5" fill="#ffffff" stroke="#d6d3d1" stroke-width="1.4"/>
    <text x="0" y="132" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#e11d48">Attention</text>
    <text x="0" y="148" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#a8a29e">overdue / blocked · red</text>
