    <text x="322" y="36" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="600" fill="#9a3412">SA</text>
    <text x="88" y="42" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="500"><tspan fill="#f97316">&gt; </tspan><tspan fill="#1c1917">Session token refresh</tspan></text>
    <text x="88" y="68" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7c3aed">// Login</text>
    <text x="88" y="174" font-family="ui-monospace, Menlo, monospace" font-size="11"><tspan fill="#78716c">3pt · </tspan><tspan fill="#e11d48">jun 15 ⚠</tspan></text>
