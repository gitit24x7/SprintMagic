    <text x="88" y="42" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="500"><tspan fill="#f97316">&gt; </tspan><tspan fill="#1c1917">Build login form</tspan></text>
    <rect x="241" y="30" width="2.4" height="15" fill="#f97316"/>
    <text x="88" y="68" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7c3aed">// Login</text>
    <text x="88" y="174" font-family="ui-monospace, Menlo, monospace" font-size="11"><tspan fill="#78716c">5pt · jun 22 · 0/3</tspan></text>
    <text x="20" y="212" font-family="Inter, Arial, sans-serif" font-size="11" fill="#a8a29e">amber lamp — work is moving</text>
  </g>

