    <circle cx="36" cy="35" r="5" fill="#f59e0b"/>
    <circle cx="36" cy="50" r="5" fill="#ffffff" stroke="#d6d3d1" stroke-width="1.4"/>
    <rect x="28" y="70" width="16" height="16" rx="4" fill="#10b981"/>
