    <circle cx="72" cy="0" r="6" fill="#f7f6f3"/>
    <circle cx="72" cy="190" r="6" fill="#f7f6f3"/>
    <line x1="72" y1="12" x2="72" y2="178" stroke="#d6d3d1" stroke-width="1.2" stroke-dasharray="2 4"/>
