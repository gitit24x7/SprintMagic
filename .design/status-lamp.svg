  <g transform="translate(392,206)">
    <rect x="0" y="0" width="348" height="190" rx="12" fill="#ffffff" stroke="#1c1917" stroke-width="1.3"/>
    <circle cx="72" cy="0" r="6" fill="#f7f6f3"/>
