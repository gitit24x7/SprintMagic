    <rect x="0" y="0" width="320" height="96" rx="12" fill="#ffffff" stroke="#1c1917" stroke-width="1.3"/>
    <circle cx="26" cy="18" r="4" fill="#ffffff" stroke="#d6d3d1" stroke-width="1.4"/>
    <circle cx="26" cy="29" r="4" fill="#ffffff" stroke="#d6d3d1" stroke-width="1.4"/>
    <circle cx="26" cy="40" r="4" fill="#ffffff" stroke="#d6d3d1" stroke-width="1.4"/>
    <circle cx="26" cy="60" r="6" fill="none" stroke="#f43f5e" stroke-width="1" opacity="0.35"/><circle cx="26" cy="60" r="3.4" fill="#f43f5e"/>
    <text x="24" y="82" text-anchor="middle" transform="rotate(-90 24 82)" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="1.5" fill="#a8a29e">SM-3</text>
    <line x1="52" y1="10" x2="52" y2="86" stroke="#d6d3d1" stroke-width="1.2" stroke-dasharray="2 4"/>
    <circle cx="52" cy="0" r="5.5" fill="#fbfbfa"/><circle cx="52" cy="96" r="5.5" fill="#fbfbfa"/>
    <text x="62" y="26" font-family="ui-monospace, Menlo, monospace" font-size="12"><tspan fill="#a8a29e">[ ] </tspan><tspan fill="#1c1917">Rate-limit login attempts</tspan></text>
    <text x="62" y="46" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7c3aed">// Login</text>
    <text x="62" y="82" font-family="ui-monospace, Menlo, monospace" font-size="10.5"><tspan fill="#a8a29e">low</tspan><tspan fill="#78716c"> · 2pt · #security</tspan></text>
