    <polyline points="21,60 24.5,63.5 31,56" stroke="#0ea5e9" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="24" y="82" text-anchor="middle" transform="rotate(-90 24 82)" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="1.5" fill="#a8a29e">SM-9</text>
    <line x1="52" y1="10" x2="52" y2="86" stroke="#d6d3d1" stroke-width="1.2" stroke-dasharray="2 4"/>
    <circle cx="52" cy="0" r="5.5" fill="#fbfbfa"/><circle cx="52" cy="96" r="5.5" fill="#fbfbfa"/>
    <text x="62" y="26" font-family="ui-monospace, Menlo, monospace" font-size="12" text-decoration="line-through"><tspan fill="#10b981">[x] </tspan><tspan fill="#a8a29e">Set up DB schema</tspan></text>
    <circle cx="298" cy="22" r="11" fill="#fed7aa"/><text x="298" y="25.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8.5" font-weight="600" fill="#9a3412">BO</text>
    <text x="62" y="46" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#0d9488">// Infra</text>
    <text x="62" y="82" font-family="ui-monospace, Menlo, monospace" font-size="10.5" fill="#78716c">3pt</text>
  </g>

