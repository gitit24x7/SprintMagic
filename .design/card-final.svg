  <!-- annotations -->
  <g font-family="Inter, Arial, sans-serif" font-size="11" fill="#a8a29e">
    <text x="396" y="124">amber lamp — in progress</text>
    <text x="396" y="232">red lamp — overdue, triage</text>
    <text x="396" y="340">green lamp — done · [x] strikes the title</text>
    <text x="396" y="448">all dim — to do · idle</text>
