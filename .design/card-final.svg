<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="1040" viewBox="0 0 680 520" fill="none">
  <rect width="680" height="520" fill="#f7f6f3"/>
  <text x="60" y="30" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1c1917">Ticket × Terminal — built</text>
  <text x="60" y="46" font-family="Inter, Arial, sans-serif" font-size="11" fill="#a8a29e">status lamp · syntax glyph · markdown [ ] toggle · mono body · thin black border</text>

  <!-- Card 1: In progress (amber) -->
