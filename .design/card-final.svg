    <circle cx="26" cy="29" r="8" fill="#f59e0b" opacity="0.18"/><circle cx="26" cy="29" r="4" fill="#f59e0b"/>
    <circle cx="26" cy="40" r="4" fill="#ffffff" stroke="#d6d3d1" stroke-width="1.4"/>
    <g transform="translate(26,60) rotate(45)"><rect x="-5" y="-5" width="10" height="10" rx="1.4" fill="#10b981"/></g>
    <text x="24" y="82" text-anchor="middle" transform="rotate(-90 24 82)" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="1.5" fill="#a8a29e">SM-5</text>
    <line x1="52" y1="10" x2="52" y2="86" stroke="#d6d3d1" stroke-width="1.2" stroke-dasharray="2 4"/>
    <circle cx="52" cy="0" r="5.5" fill="#fbfbfa"/><circle cx="52" cy="96" r="5.5" fill="#fbfbfa"/>
    <text x="62" y="26" font-family="ui-monospace, Menlo, monospace" font-size="12"><tspan fill="#a8a29e">[ ] </tspan><tspan fill="#1c1917">Build login form</tspan></text>
    <circle cx="298" cy="22" r="11" fill="#fed7aa"/><text x="298" y="25.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8.5" font-weight="600" fill="#9a3412">AL</text>
    <text x="62" y="46" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7c3aed">// Login</text>
    <text x="62" y="82" font-family="ui-monospace, Menlo, monospace" font-size="10.5"><tspan fill="#f43f5e">high</tspan><tspan fill="#78716c"> · 5pt · jun 22 · 0/3</tspan></text>
  </g>

