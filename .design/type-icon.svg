<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="600" viewBox="0 0 620 300" fill="none">
  <rect width="620" height="300" fill="#f7f6f3"/>
  <text x="20" y="26" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1c1917">Issue-type indicator — current vs. options</text>
  <text x="20" y="42" font-family="Inter, Arial, sans-serif" font-size="11" fill="#a8a29e">story · task · bug</text>

  <text x="220" y="72" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" letter-spacing="1.5" fill="#047857">STORY</text>
  <text x="360" y="72" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" letter-spacing="1.5" fill="#0369a1">TASK</text>
  <text x="500" y="72" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" letter-spacing="1.5" fill="#e11d48">BUG</text>
  <line x1="20" y1="84" x2="600" y2="84" stroke="#e7e5e4" stroke-width="1"/>

  <!-- Current -->
  <text x="20" y="116" font-family="Inter, Arial, sans-serif" font-size="12" fill="#78716c">Current</text>
  <g>
    <rect x="212" y="104" width="16" height="16" rx="4" fill="#10b981"/><rect x="217" y="109" width="6" height="6" rx="1" fill="#fff"/>
    <rect x="352" y="104" width="16" height="16" rx="4" fill="#0ea5e9"/><polyline points="356,112 359,116 364,109" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="492" y="104" width="16" height="16" rx="4" fill="#f43f5e"/><circle cx="500" cy="112" r="2.6" fill="#fff"/>
  </g>

  <!-- A Soft tag (mono letter) -->
  <text x="20" y="172" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#1c1917">A · Soft tag</text>
  <text x="20" y="187" font-family="Inter, Arial, sans-serif" font-size="10" fill="#a8a29e">mono letter, tinted</text>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="700">
    <rect x="211" y="159" width="18" height="18" rx="5" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/><text x="220" y="172" text-anchor="middle" fill="#047857">S</text>
    <rect x="351" y="159" width="18" height="18" rx="5" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1"/><text x="360" y="172" text-anchor="middle" fill="#0369a1">T</text>
    <rect x="491" y="159" width="18" height="18" rx="5" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/><text x="500" y="172" text-anchor="middle" fill="#e11d48">B</text>
  </g>

  <!-- B Syntax glyph (no box) -->
  <text x="20" y="228" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#1c1917">B · Syntax glyph</text>
  <text x="20" y="243" font-family="Inter, Arial, sans-serif" font-size="10" fill="#a8a29e">distinct shape per type</text>
  <g transform="translate(220,224) rotate(45)"><rect x="-5" y="-5" width="10" height="10" rx="1.5" fill="#10b981"/></g>
  <polyline points="354,224 358,229 366,219" stroke="#0ea5e9" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="500" cy="224" r="7.5" stroke="#f43f5e" stroke-width="1" opacity="0.35" fill="none"/><circle cx="500" cy="224" r="4.2" fill="#f43f5e"/>

  <!-- C Refined fill -->
  <text x="20" y="284" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#1c1917">C · Refined fill</text>
  <text x="20" y="299" font-family="Inter, Arial, sans-serif" font-size="10" fill="#a8a29e">softer, real glyph</text>
  <g>
    <rect x="211" y="271" width="18" height="18" rx="5.5" fill="#059669"/><path d="M217 277 h6 v8 l-3 -2 l-3 2 z" fill="#fff"/>
    <rect x="351" y="271" width="18" height="18" rx="5.5" fill="#0284c7"/><polyline points="356,280 359,284 365,277" stroke="#fff" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="491" y="271" width="18" height="18" rx="5.5" fill="#e11d48"/><circle cx="500" cy="280" r="2.4" fill="#fff"/><circle cx="500" cy="280" r="5" stroke="#fff" stroke-width="1" opacity="0.5" fill="none"/>
  </g>
</svg>
