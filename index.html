      <main>
        <h1>SprintMagic — Free Markdown Kanban Board for Developers</h1>
        <p>
          SprintMagic is a free, open-source project management tool that turns a plain Markdown
          file into a beautiful, drag-and-drop Kanban sprint board. GitHub Actions automatically
          move your cards when pull requests are opened or merged — no manual updates, ever.
        </p>
        <h2>Why SprintMagic?</h2>
        <ul>
          <li>Jira alternative — free, zero signup, zero backend</li>
          <li>Markdown-native: write <code>## Column</code> and <code>- [ ] task</code> to create boards instantly</li>
          <li>GitHub auto-sync: PRs and merges move cards automatically</li>
          <li>100% local-first: your data never leaves your repository</li>
          <li>P0-P3 and High/Med/Low priority labels for engineers and product teams</li>
          <li>Epics, subtasks, story points, due dates, and assignees built-in</li>
          <li>Overdue task highlighting</li>
          <li>Open source, MIT license</li>
        </ul>
        <h2>Get Started in One Command</h2>
        <pre><code>npx sprintmagic init</code></pre>
        <p>
          This creates a <code>board.md</code> in your repo and installs a GitHub Actions workflow
          that keeps your board in sync with your git activity automatically.
        </p>
        <h2>Frequently Asked Questions</h2>
        <h3>Is SprintMagic free?</h3>
        <p>Yes. SprintMagic is completely free and open source (MIT license). No paid plan, no trial.</p>
        <h3>How does SprintMagic compare to Jira or Linear?</h3>
        <p>
          Unlike Jira or Linear, SprintMagic requires no account and no server. Your board is a
          single Markdown file. It is ideal for indie hackers, small engineering teams, and
          open-source projects that want maximum velocity with zero overhead.
        </p>
        <h3>Does SprintMagic store my data?</h3>
        <p>No. Everything lives in your own repository. Nothing is sent to any server.</p>
